name: Update Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Run crawler
        env:
          SUB_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/nodes_base64.txt
          BASE64_URL: placeholder
        run: python crawler.py
      
      - name: Update Base64 URL in HTML
        run: |
          python3 -c "
          import os
          base64_content = open('nodes_base64.txt').read().strip()
          html = open('index.html').read()
          html = html.replace('placeholder', 'data:text/plain;base64,' + base64_content)
          open('index.html', 'w').write(html)
          print('[OK] Updated Base64 URL in HTML')
          "
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add -A
          git commit -m "🔄 自动更新节点 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
